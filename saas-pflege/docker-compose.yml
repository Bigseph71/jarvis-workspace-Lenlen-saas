# Len Len – lokale Dev-Umgebung.
# Start:  cp .env.example .env  &&  docker compose up -d
#
# Netz-Topologie:
#   - "edge"     : von außen erreichbar (web, backend)
#   - "internal" : NUR intern (postgres, redis, vrptw-worker, ki-service)
#     -> interne Microservices haben keinen direkten Internetzugang.

name: len-len

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lenlen}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_in_prod}
      POSTGRES_DB: ${POSTGRES_DB:-lenlen}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lenlen} -d ${POSTGRES_DB:-lenlen}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - internal

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-lenlen}:${POSTGRES_PASSWORD:-change_me_in_prod}@postgres:5432/${POSTGRES_DB:-lenlen}?schema=public
      REDIS_URL: redis://redis:6379
      NODE_ENV: ${NODE_ENV:-development}
    ports:
      - "${BACKEND_PORT:-4000}:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - edge
      - internal

  vrptw-worker:
    build:
      context: .
      dockerfile: apps/vrptw-worker/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-lenlen}:${POSTGRES_PASSWORD:-change_me_in_prod}@postgres:5432/${POSTGRES_DB:-lenlen}?schema=public
      REDIS_URL: redis://redis:6379
      NODE_ENV: ${NODE_ENV:-development}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal

  ki-service:
    build:
      context: .
      dockerfile: apps/ki-service/Dockerfile
    restart: unless-stopped
    environment:
      KI_PORT: 8000
    # Kein Port-Mapping nach außen: nur intern erreichbar.
    networks:
      - internal

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
      NODE_ENV: ${NODE_ENV:-development}
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      - backend
    networks:
      - edge

volumes:
  pgdata:
  redisdata:

networks:
  edge:
    driver: bridge
  internal:
    driver: bridge
    internal: true
